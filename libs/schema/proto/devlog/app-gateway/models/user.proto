syntax = "proto2";

package devlog.app_gateway.models;

message User {
    message UserId {
        required string app_name = 1;
        required string email = 2;
        required uint64 id = 3;
    }

    required string user_name = 1;
    required string app_name = 2;
    optional string avatar_url = 3;
    required string display_name = 4;
    required string email = 5;
    required UserId id = 6;
    required int32 maximum_device = 7;
    required uint64 order_id = 8;
}

message PublicUser {
    optional string user_name = 1;
    optional string avatar_url = 2;
    optional string display_name = 3;
    optional uint64 order_id = 4;
}