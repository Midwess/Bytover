syntax = "proto2";

package devlog.bitbridge;

// NOTE: The RelayService gRPC service has been removed.
// relay-server now uses turn-server for TURN relay functionality.
// The message types below are retained for data channel configuration
// in native/wasm WebRTC clients.

// Deprecated: relay-server no longer provides gRPC RelayService.
// Use turn-server for TURN relay functionality instead.
// The DataChannel, ConnectRequest, ConnectResponse types are retained
// for general data channel configuration in P2P connections.

message DataChannel {
  required uint32 max_retransmit = 1;
  required bool ordered = 2;
  required int32 negotiate = 3;
  required string label = 4;
}

message ConnectRequest {
  required string sdp = 1;
  required string session_id = 2;
  repeated DataChannel channels = 3;
}

message ConnectResponse {
  required bool success = 1;
  optional string sdp = 2;
  optional string error_message = 3;
}

