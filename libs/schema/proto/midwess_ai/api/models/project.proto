syntax = "proto2";

package midwess.api.models;

import "value/datetime.proto";

message Project {
    required int64 id = 1;
    required string name = 2;
    optional string description = 3;
    required int64 workspace_id = 5;
    required ProjectStatus status = 6;
    required value.datetime.Datetime created_at = 7;
    optional value.datetime.Datetime updated_at = 8;
    optional string builder_url = 13;
    optional string app_url = 14;
}

enum ProjectStatus {
    NEW = 0;
    INITIALIZING = 1;
    AVAILABLE = 2;
    MAINTAINING = 3;
}
