syntax = "proto2";

package midwess.api.public;

service ChatService {
    rpc GetConfig(GetChatConfigRequest) returns (ChatConfig);
    rpc UpdateConfig(UpdateChatConfigRequest) returns (ChatConfig);
}

message GetChatConfigRequest {}

message UpdateChatConfigRequest {
    optional string model_name = 1;
    optional string api_key = 2;
    optional string base_url = 3;
    optional int32 max_tokens = 4;
}

message ChatConfig {
    required string model_name = 1;
    required string api_key = 2;
    required string base_url = 3;
    optional int32 max_tokens = 4;
}
