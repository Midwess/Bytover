name: Railway Deployment

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Debug
        run: |
          echo '${{ vars.SSH_PRIVATE_KEY }}'
      - name: Deploy to Railway
        uses: Midwess/deployment/.github/actions/railway_deployment@main
        with:
          version: ${{ github.sha }}
          submodules: 'schema,devlog-sdk,core-services'
          repository: 'Midwess/rpc-signalling'
          deploy_branch: 'deploy'
          ssh_key: ${{ vars.SSH_PRIVATE_KEY }}