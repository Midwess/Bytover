name: Desktop Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        type: choice
        options:
          - macos
          - windows
          - linux
          - all
      branch:
        description: 'Branch to build from'
        required: true
        type: string
        default: main
      version:
        description: 'Version for the build (e.g., 1.0.1)'
        required: true
        type: string

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create-release.outputs.upload_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.branch }}

      - name: Push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG_NAME="v${{ inputs.version }}-${{ github.run_id }}"
          git tag $TAG_NAME
          git push origin $TAG_NAME
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}-${{ github.run_id }}
          name: Bytover v${{ inputs.version }}
          target_commitish: ${{ inputs.branch }}
          generate_release_notes: true
          token: ${{ secrets.GIT_TOKEN }}
          draft: true

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            enable: ${{ inputs.platform == 'macos' || inputs.platform == 'all' }}
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            enable: ${{ inputs.platform == 'windows' || inputs.platform == 'all' }}
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            enable: ${{ inputs.platform == 'linux' || inputs.platform == 'all' }}
          - platform: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            enable: ${{ inputs.platform == 'linux' || inputs.platform == 'all' }}

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        if: matrix.enable
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          submodules: 'recursive'
          token: ${{ secrets.GIT_TOKEN }}

      - name: Update version in files
        if: matrix.enable
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          echo "Setting version to $VERSION"
          
          # Update package.json
          if [ -f "desktop/package.json" ]; then
            sed -i 's/"version": ".*"/"version": "'$VERSION'"/' desktop/package.json
          fi
          
          # Update tauri.conf.json
          if [ -f "desktop/src-tauri/tauri.conf.json" ]; then
            sed -i 's/"version": ".*"/"version": "'$VERSION'"/' desktop/src-tauri/tauri.conf.json
          fi
          
          # Update Cargo.toml
          if [ -f "desktop/src-tauri/Cargo.toml" ]; then
            sed -i '0,/^version = ".*"/s//version = "'$VERSION'"/' desktop/src-tauri/Cargo.toml
          fi

      - name: Install dependencies (Ubuntu only)
        if: matrix.enable && matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
            echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
            echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV
          fi

      - name: Install pnpm
        if: matrix.enable
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        if: matrix.enable
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install Rust
        if: matrix.enable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        if: matrix.enable
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            desktop/src-tauri -> target

      - name: Install dependencies
        if: matrix.enable
        run: |
          cd desktop
          pnpm install

      - name: Build shared types
        if: matrix.enable
        run: |
          cargo build -p shared_types --target wasm32-unknown-unknown

      - name: Build Tauri App
        if: matrix.enable
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ inputs.version }}-${{ github.run_id }}
          projectPath: desktop
          args: --target ${{ matrix.target }}
