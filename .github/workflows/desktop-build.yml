name: Desktop Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        type: choice
        options:
          - macos
          - windows
          - linux
          - all
      branch:
        description: 'Branch to build from'
        required: true
        type: string
        default: main

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create-release.outputs.upload_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-build-${{ github.run_id }}
          generate_release_notes: true
          token: ${{ secrets.GIT_TOKEN }}
          draft: true

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            enable: ${{ inputs.platform == 'macos' || inputs.platform == 'all' }}
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            enable: ${{ inputs.platform == 'windows' || inputs.platform == 'all' }}
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            enable: ${{ inputs.platform == 'linux' || inputs.platform == 'all' }}
          - platform: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            enable: ${{ inputs.platform == 'linux' || inputs.platform == 'all' }}

    runs-on: ${{ matrix.platform }}
    if: matrix.enable
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          submodules: 'recursive'

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
            echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
            echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            desktop/src-tauri -> target

      - name: Install dependencies
        run: |
          cd desktop
          pnpm install

      - name: Build shared types
        run: |
          cargo build -p shared_types --target wasm32-unknown-unknown

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
        with:
          tagName: desktop-build-${{ github.run_id }}
          projectPath: desktop
          args: --target ${{ matrix.target }}
