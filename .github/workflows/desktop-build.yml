name: desktop-release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (all = macos-dmg + windows + linux; macos-appstore is opt-in only)'
        required: true
        type: choice
        options:
          - macos-dmg
          - macos-appstore
          - windows
          - linux
          - all

permissions:
  contents: write

jobs:
  generate-types:
    # Runs on Ubuntu to generate TypeScript types (requires pnpm)
    # All other platforms download these artifacts instead of regenerating
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.GIT_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
           workspaces: |
            . -> target
           shared-key: rust-generate-types

      - name: Generate TypeScript types
        run: |
          cargo build -p shared_types --target wasm32-unknown-unknown --no-default-features --features typescript
          # Touch the generated files so their timestamps are newer than shared/
          find shared_types/generated -type f -exec touch {} \; 2>/dev/null || true

      - name: Upload generated types
        uses: actions/upload-artifact@v4
        with:
          name: shared-types-generated
          path: shared_types/generated/
          retention-days: 1

  deploy:
    needs: [generate-types]
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: build-macos-dmg
            platform: macos-latest
            target: aarch64-apple-darwin,x86_64-apple-darwin
            tauri_target: universal-apple-darwin
            enable: ${{ github.event.inputs.platform == 'macos-dmg' || github.event.inputs.platform == 'all' }}
          - name: build-macos-appstore
            platform: macos-latest
            target: aarch64-apple-darwin,x86_64-apple-darwin
            tauri_target: universal-apple-darwin
            enable: ${{ github.event.inputs.platform == 'macos-appstore' }}
          - name: build-windows-x64
            platform: windows-latest
            target: x86_64-pc-windows-msvc
            tauri_target: x86_64-pc-windows-msvc
            enable: ${{ github.event.inputs.platform == 'windows' || github.event.inputs.platform == 'all' }}
          - name: build-windows-arm64
            platform: windows-2025
            target: aarch64-pc-windows-msvc
            tauri_target: aarch64-pc-windows-msvc
            enable: ${{ github.event.inputs.platform == 'windows' || github.event.inputs.platform == 'all' }}
          - name: build-linux-x64
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            tauri_target: x86_64-unknown-linux-gnu
            enable: ${{ github.event.inputs.platform == 'linux' || github.event.inputs.platform == 'all' }}
          - name: build-linux-arm64
            platform: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            tauri_target: aarch64-unknown-linux-gnu
            enable: ${{ github.event.inputs.platform == 'linux' || github.event.inputs.platform == 'all' }}

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 2880
    env:
      BYTOVER_LOCATOR_URL: ${{ vars.BYTOVER_LOCATOR_URL }}
      BYTOVER_PUBLIC_HTTP1_GATEWAY_HOST: ${{ vars.BYTOVER_PUBLIC_HTTP1_GATEWAY_HOST }}
      BYTOVER_PUBLIC_GATEWAY_HOST: ${{ vars.BYTOVER_PUBLIC_GATEWAY_HOST }}
      BYTOVER_PUBLIC_GATEWAY_PORT: ${{ vars.BYTOVER_PUBLIC_GATEWAY_PORT }}
      BYTOVER_PUBLIC_HTTP1_GATEWAY_PORT: ${{ vars.BYTOVER_PUBLIC_HTTP1_GATEWAY_PORT }}
      BYTOVER_WITH_SSL: ${{ vars.BYTOVER_WITH_SSL }}
    steps:
      - name: Checkout code
        if: matrix.enable
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.GIT_TOKEN }}

      - name: Download generated types
        if: matrix.enable
        uses: actions/download-artifact@v4
        with:
          name: shared-types-generated
          path: shared_types/generated/

      - name: Install dependencies (Ubuntu only)
        if: matrix.enable && matrix.platform == 'ubuntu-22.04'
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo dpkg --add-architecture arm64
            # Update existing sources to be amd64-only to prevent 404s
            sudo sed -i 's/deb http/deb [arch=amd64] http/g' /etc/apt/sources.list
            sudo sed -i 's/deb mirror/deb [arch=amd64] mirror/g' /etc/apt/sources.list

            CODENAME=$(lsb_release -cs)
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ ${CODENAME} main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64.list
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ ${CODENAME}-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ ${CODENAME}-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          fi

          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y \
              gcc-aarch64-linux-gnu \
              g++-aarch64-linux-gnu \
              libc6-dev-arm64-cross \
              libssl-dev:arm64 \
              libgtk-3-dev:arm64 \
              libwebkit2gtk-4.1-dev:arm64 \
              libayatana-appindicator3-dev:arm64 \
              librsvg2-dev:arm64

            echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
            echo "PKG_CONFIG_PATH_aarch64_unknown_linux_gnu=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> $GITHUB_ENV
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
            echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
            echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV
          fi

      - name: Setup Node
        if: matrix.enable
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        if: matrix.enable
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        if: matrix.enable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        if: matrix.enable
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rust cache
        if: matrix.enable
        uses: swatinem/rust-cache@v2
        with:
           workspaces: |
            . -> target
           shared-key: "desktop-${{ matrix.name }}"

      - name: Install desktop dependencies
        if: matrix.enable
        run: |
          cd desktop
          pnpm install

      - name: Copy types to desktop node_modules
        if: matrix.enable
        shell: bash
        run: |
          # Copy generated TypeScript to desktop's node_modules after pnpm install
          cp -r shared_types/generated/typescript desktop/node_modules/shared_types

      - name: Prepare Apple API key
        if: matrix.enable && matrix.platform == 'macos-latest'
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          KEY_PATH="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Import App Store certificate
        if: matrix.enable && matrix.name == 'build-macos-appstore'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/appstore.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          P12="$RUNNER_TEMP/AppleSigning.p12"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$P12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$P12" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          rm -f "$P12"
          echo "APPSTORE_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "::add-mask::$KEYCHAIN_PASSWORD"
          echo "APPSTORE_KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Install App Store provisioning profile
        if: matrix.enable && matrix.name == 'build-macos-appstore'
        shell: bash
        run: |
          set -euo pipefail
          PROFILE_PATH="desktop/src-tauri/Bytover_Production.provisionprofile"
          if [ ! -f "$PROFILE_PATH" ]; then
            echo "::error::Profile file missing at $PROFILE_PATH. The Mac App Store distribution profile must be committed at this path."
            exit 1
          fi
          PROFILE_PLIST=$(security cms -D -i "$PROFILE_PATH")
          PROFILE_TEAM=$(printf '%s' "$PROFILE_PLIST" | plutil -extract TeamIdentifier.0 raw -)
          PROFILE_APP_ID=$(printf '%s' "$PROFILE_PLIST" | plutil -extract 'Entitlements.com\.apple\.application-identifier' raw - 2>/dev/null \
            || printf '%s' "$PROFILE_PLIST" | plutil -extract 'Entitlements.application-identifier' raw -)
          if [ "$PROFILE_TEAM" != "BUJKWCX7F4" ]; then
            echo "::error::Provisioning profile TeamIdentifier mismatch: expected BUJKWCX7F4, got $PROFILE_TEAM"
            exit 1
          fi
          if [ "$PROFILE_APP_ID" != "BUJKWCX7F4.com.midwess.bytover" ]; then
            echo "::error::Provisioning profile application-identifier mismatch: expected BUJKWCX7F4.com.midwess.bytover, got $PROFILE_APP_ID"
            exit 1
          fi
          EXP_RAW=$(printf '%s' "$PROFILE_PLIST" | plutil -extract ExpirationDate raw -)
          EXP_EPOCH=$(date -j -f "%Y-%m-%dT%H:%M:%SZ" "$EXP_RAW" +%s)
          NOW_EPOCH=$(date +%s)
          DAYS_LEFT=$(( (EXP_EPOCH - NOW_EPOCH) / 86400 ))
          if [ "$DAYS_LEFT" -lt 0 ]; then
            echo "::error::Provisioning profile EXPIRED on $EXP_RAW. Re-issue from Apple Developer portal and commit the new file at $PROFILE_PATH."
            exit 1
          elif [ "$DAYS_LEFT" -lt 30 ]; then
            echo "::warning::Provisioning profile expires in $DAYS_LEFT days ($EXP_RAW). Plan rotation."
          else
            echo "Provisioning profile valid for $DAYS_LEFT more days (until $EXP_RAW)"
          fi
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$(uuidgen).provisionprofile"

      - name: Debug BYTOVER environment
        if: matrix.enable
        run: printenv | grep BYTOVER

      - name: Privacy manifest drift check (warning-only)
        if: matrix.enable && matrix.name == 'build-macos-appstore'
        shell: bash
        run: |
          set -uo pipefail
          # Find required-reason API symbols added since main without
          # a matching PrivacyInfo.xcprivacy update. Warn-only; never fails.
          BASE="origin/main"
          if ! git rev-parse --verify "$BASE" >/dev/null 2>&1; then
            echo "Base ref $BASE not available; skipping drift check."
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BASE"...HEAD || true)
          if echo "$CHANGED" | grep -q "^desktop/src-tauri/PrivacyInfo.xcprivacy$"; then
            echo "PrivacyInfo.xcprivacy was updated in this branch — drift check satisfied."
            exit 0
          fi
          PATTERN='\.modified\(\)|\.created\(\)|\.accessed\(\)|SystemTime::now|UNIX_EPOCH'
          HITS=$(echo "$CHANGED" | grep -E '\.rs$' | xargs -I{} git diff "$BASE"...HEAD -- {} 2>/dev/null | grep -E "^\+" | grep -E "$PATTERN" || true)
          if [ -n "$HITS" ]; then
            echo "::warning::New required-reason API call sites detected in this branch without a PrivacyInfo.xcprivacy update."
            echo "$HITS"
            echo "If these calls are reachable in the App Store build, update desktop/src-tauri/PrivacyInfo.xcprivacy."
          else
            echo "No new required-reason API symbols in branch diff."
          fi

      - name: Build Tauri App (DMG)
        if: matrix.enable && matrix.name == 'build-macos-dmg'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          BYTOVER_LOCATOR_URL: ${{ vars.BYTOVER_LOCATOR_URL }}
          BYTOVER_PUBLIC_HTTP1_GATEWAY_HOST: ${{ vars.BYTOVER_PUBLIC_HTTP1_GATEWAY_HOST }}
          BYTOVER_PUBLIC_GATEWAY_HOST: ${{ vars.BYTOVER_PUBLIC_GATEWAY_HOST }}
          BYTOVER_PUBLIC_GATEWAY_PORT: ${{ vars.BYTOVER_PUBLIC_GATEWAY_PORT }}
          BYTOVER_PUBLIC_HTTP1_GATEWAY_PORT: ${{ vars.BYTOVER_PUBLIC_HTTP1_GATEWAY_PORT }}
          BYTOVER_WITH_SSL: ${{ vars.BYTOVER_WITH_SSL }}
        with:
          tagName: ${{ github.ref_name == 'production' && 'v__VERSION__' || 'v__VERSION__-beta' }}
          releaseName: "Bytover v__VERSION__ ${{ github.ref_name != 'production' && '(Beta)' || '' }}"
          artifactName: Bytover-${{ github.ref_name != 'production' && '__VERSION__-beta' || '__VERSION__' }}-macos-dmg
          releaseDraft: true
          prerelease: false
          projectPath: desktop
          args: --target universal-apple-darwin --features log-file --skip-stapling

      - name: Build Tauri App (App Store)
        if: matrix.enable && matrix.name == 'build-macos-appstore'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "3rd Party Mac Developer Application: Midwess LLC (BUJKWCX7F4)"
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          BYTOVER_LOCATOR_URL: ${{ vars.BYTOVER_LOCATOR_URL }}
          BYTOVER_PUBLIC_HTTP1_GATEWAY_HOST: ${{ vars.BYTOVER_PUBLIC_HTTP1_GATEWAY_HOST }}
          BYTOVER_PUBLIC_GATEWAY_HOST: ${{ vars.BYTOVER_PUBLIC_GATEWAY_HOST }}
          BYTOVER_PUBLIC_GATEWAY_PORT: ${{ vars.BYTOVER_PUBLIC_GATEWAY_PORT }}
          BYTOVER_PUBLIC_HTTP1_GATEWAY_PORT: ${{ vars.BYTOVER_PUBLIC_HTTP1_GATEWAY_PORT }}
          BYTOVER_WITH_SSL: ${{ vars.BYTOVER_WITH_SSL }}
        with:
          artifactName: Bytover-appstore-${{ github.ref_name == 'production' && '__VERSION__' || '__VERSION__-beta' }}
          prerelease: false
          projectPath: desktop
          args: --target universal-apple-darwin --features log-file --bundles app --config src-tauri/tauri.conf.appstore.json

      - name: Inject App Store Info.plist keys & re-sign
        if: matrix.enable && matrix.name == 'build-macos-appstore'
        env:
          APPLE_SIGNING_IDENTITY: "3rd Party Mac Developer Application: Midwess LLC (BUJKWCX7F4)"
        shell: bash
        run: |
          set -euo pipefail
          APP_DIR="target/universal-apple-darwin/release/bundle/macos"
          APP=$(find "$APP_DIR" -maxdepth 1 -name "*.app" -type d -print -quit)
          if [ -z "$APP" ]; then
            echo "::error::No .app bundle found in $APP_DIR"
            exit 1
          fi

          INFO="$APP/Contents/Info.plist"
          OVERLAY="desktop/src-tauri/Info.appstore.plist"
          if [ ! -f "$OVERLAY" ]; then
            echo "::error::Overlay file missing at $OVERLAY"
            exit 1
          fi

          # Merge ITSAppUsesNonExemptEncryption into the bundled Info.plist.
          # Idempotent: -replace if key exists, -insert otherwise.
          if plutil -extract ITSAppUsesNonExemptEncryption raw "$INFO" >/dev/null 2>&1; then
            plutil -replace ITSAppUsesNonExemptEncryption -bool YES "$INFO"
          else
            plutil -insert ITSAppUsesNonExemptEncryption -bool YES "$INFO"
          fi
          plutil -lint "$INFO"
          echo "ITSAppUsesNonExemptEncryption=$(plutil -extract ITSAppUsesNonExemptEncryption raw "$INFO")"

          # Verify the privacy manifest landed in Resources/ via tauri.conf.appstore.json.
          MANIFEST="$APP/Contents/Resources/PrivacyInfo.xcprivacy"
          if [ ! -f "$MANIFEST" ]; then
            echo "::error::PrivacyInfo.xcprivacy missing from $MANIFEST. Check bundle.resources in tauri.conf.appstore.json."
            exit 1
          fi
          plutil -lint "$MANIFEST"

          # Re-sign the bundle: plutil -insert/-replace invalidated the inner code signature.
          security unlock-keychain -p "$APPSTORE_KEYCHAIN_PASSWORD" "$APPSTORE_KEYCHAIN_PATH"
          codesign --force --deep --options runtime \
            --entitlements desktop/src-tauri/entitlements.appstore.plist \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
          codesign -d --entitlements - --xml "$APP" >/dev/null
          echo "Re-sign verified."

      - name: Build Tauri App (Windows / Linux)
        if: matrix.enable && matrix.platform != 'macos-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          PKG_CONFIG_PATH: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && '/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig' || '' }}
          TAURI_LINUX_AYATANA_APPINDICATOR: true
          BYTOVER_LOCATOR_URL: ${{ vars.BYTOVER_LOCATOR_URL }}
          BYTOVER_PUBLIC_HTTP1_GATEWAY_HOST: ${{ vars.BYTOVER_PUBLIC_HTTP1_GATEWAY_HOST }}
          BYTOVER_PUBLIC_GATEWAY_HOST: ${{ vars.BYTOVER_PUBLIC_GATEWAY_HOST }}
          BYTOVER_PUBLIC_GATEWAY_PORT: ${{ vars.BYTOVER_PUBLIC_GATEWAY_PORT }}
          BYTOVER_PUBLIC_HTTP1_GATEWAY_PORT: ${{ vars.BYTOVER_PUBLIC_HTTP1_GATEWAY_PORT }}
          BYTOVER_WITH_SSL: ${{ vars.BYTOVER_WITH_SSL }}
        with:
          tagName: ${{ github.ref_name == 'production' && 'v__VERSION__' || 'v__VERSION__-beta' }}
          releaseName: "Bytover v__VERSION__ ${{ github.ref_name != 'production' && '(Beta)' || '' }}"
          artifactName: Bytover-${{ github.ref_name != 'production' && '__VERSION__-beta' || '__VERSION__' }}-${{ matrix.platform }}
          releaseDraft: true
          prerelease: false
          projectPath: desktop
          args: --target ${{ matrix.tauri_target }} --features log-file

      - name: Build App Store Package
        if: matrix.enable && matrix.name == 'build-macos-appstore'
        shell: bash
        run: |
          set -euo pipefail
          APP_DIR="target/universal-apple-darwin/release/bundle/macos"
          APP=$(find "$APP_DIR" -maxdepth 1 -name "*.app" -type d -print -quit)
          if [ -z "$APP" ]; then
            echo "::error::No .app bundle found in $APP_DIR"
            exit 1
          fi
          PKG_PATH="$RUNNER_TEMP/Bytover.pkg"
          productbuild --component "$APP" /Applications "$PKG_PATH" --sign "3rd Party Mac Developer Installer"
          pkgutil --check-signature "$PKG_PATH"
          codesign -dv --verbose=4 "$APP" 2>&1 || true
          echo "APPSTORE_PKG_PATH=$PKG_PATH" >> "$GITHUB_ENV"

      - name: Export .pkg as workflow artifact
        if: matrix.enable && matrix.name == 'build-macos-appstore'
        uses: actions/upload-artifact@v4
        with:
          name: Bytover-appstore-pkg
          path: ${{ env.APPSTORE_PKG_PATH }}
          retention-days: 14
          if-no-files-found: error

      - name: Upload to App Store Connect
        if: matrix.enable && matrix.name == 'build-macos-appstore'
        env:
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPSTORE_PKG_PATH: ${{ env.APPSTORE_PKG_PATH }}
        shell: bash
        run: |
          set -euo pipefail
          for DIR in "$HOME/.appstoreconnect/private_keys" "$HOME/private_keys"; do
            mkdir -p "$DIR"
            cp "$APPLE_API_KEY_PATH" "$DIR/AuthKey_${APPLE_API_KEY_ID}.p8"
            chmod 600 "$DIR/AuthKey_${APPLE_API_KEY_ID}.p8"
          done
          xcrun altool --upload-app -f "$APPSTORE_PKG_PATH" \
            --type macos \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER"

      - name: Verify macOS signing
        if: matrix.enable && matrix.name == 'build-macos-dmg'
        shell: bash
        run: |
          set -euo pipefail
          APP_DIR="target/universal-apple-darwin/release/bundle/macos"
          if [ ! -d "$APP_DIR" ]; then
            echo "Bundle directory not found: $APP_DIR"
            echo "--- searching for any .app bundle ---"
            find target -maxdepth 6 -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi
          APP=$(find "$APP_DIR" -maxdepth 1 -name "*.app" -print -quit)
          if [ -z "$APP" ]; then
            echo "No .app bundle found under $APP_DIR"
            exit 1
          fi
          echo "Verifying: $APP"
          echo "---- codesign signature ----"
          codesign -dv --verbose=4 "$APP" 2>&1 || true
          echo "---- codesign entitlements ----"
          codesign -d --entitlements - --xml "$APP" 2>&1 || true
          echo "---- codesign --verify ----"
          codesign --verify --deep --strict --verbose=2 "$APP"
          echo "---- spctl assess (online: may fail until Apple finishes notarizing) ----"
          spctl --assess --type exec --verbose=4 "$APP" || echo "spctl not yet accepted (notarization may still be in flight)"
          echo "---- stapler validate (will fail with --skip-stapling; staple manually after Apple accepts) ----"
          xcrun stapler validate "$APP" || echo "no ticket stapled yet"

      - name: Notarization status (manual follow-up)
        if: matrix.enable && matrix.name == 'build-macos-dmg'
        env:
          KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Recent notarization submissions for this account:"
          xcrun notarytool history \
            --key "$KEY_PATH" \
            --key-id "$KEY_ID" \
            --issuer "$ISSUER" || true
          echo ""
          echo "To check a submission later, run locally with the same API key:"
          echo "  xcrun notarytool info <submission-id> --key AuthKey_<KEY_ID>.p8 --key-id <KEY_ID> --issuer <ISSUER>"
          echo "  xcrun notarytool log  <submission-id> --key AuthKey_<KEY_ID>.p8 --key-id <KEY_ID> --issuer <ISSUER> developer_log.json"
          echo "Once Apple returns Accepted, staple offline tickets manually:"
          echo "  xcrun stapler staple Bytover.app"
          echo "  xcrun stapler staple Bytover-*.dmg"
