name: Desktop Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        type: choice
        options:
          - macos
          - windows
          - linux
          - all

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin,x86_64-apple-darwin
            tauri_target: universal-apple-darwin
            enable: ${{ github.event.inputs.platform == 'macos' || github.event.inputs.platform == 'all' }}
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            tauri_target: x86_64-pc-windows-msvc
            enable: ${{ github.event.inputs.platform == 'windows' || github.event.inputs.platform == 'all' }}
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            tauri_target: x86_64-unknown-linux-gnu
            enable: ${{ github.event.inputs.platform == 'linux' || github.event.inputs.platform == 'all' }}
          - platform: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            tauri_target: aarch64-unknown-linux-gnu
            enable: ${{ github.event.inputs.platform == 'linux' || github.event.inputs.platform == 'all' }}

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        if: matrix.enable
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.GIT_TOKEN }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.enable && matrix.platform == 'ubuntu-22.04'
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo dpkg --add-architecture arm64
            # Update existing sources to be amd64-only to prevent 404s
            sudo sed -i 's/deb http/deb [arch=amd64] http/g' /etc/apt/sources.list
            sudo sed -i 's/deb mirror/deb [arch=amd64] mirror/g' /etc/apt/sources.list
            
            CODENAME=$(lsb_release -cs)
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ ${CODENAME} main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64.list
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ ${CODENAME}-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ ${CODENAME}-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          fi

          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y \
              gcc-aarch64-linux-gnu \
              g++-aarch64-linux-gnu \
              libc6-dev-arm64-cross \
              pkg-config-aarch64-linux-gnu \
              libssl-dev:arm64 \
              libgtk-3-dev:arm64 \
              libwebkit2gtk-4.1-dev:arm64 \
              libayatana-appindicator3-dev:arm64 \
              librsvg2-dev:arm64

            echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
            echo "PKG_CONFIG_PATH_aarch64_unknown_linux_gnu=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
            echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
            echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV
          fi

      - name: Install pnpm
        if: matrix.enable
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        if: matrix.enable
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install Rust
        if: matrix.enable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}, wasm32-unknown-unknown

      - name: Install protoc
        if: matrix.enable
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rust cache
        if: matrix.enable
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            desktop/src-tauri -> target

      - name: Build shared types
        if: matrix.enable
        run: |
          cargo build -p shared_types --target wasm32-unknown-unknown

      - name: Install desktop dependencies
        if: matrix.enable
        run: |
          cd desktop
          pnpm install

      - name: Build Tauri App
        if: matrix.enable
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Bytover v__VERSION__"
          releaseDraft: true
          prerelease: false
          projectPath: desktop
          args: --target ${{ matrix.tauri_target }}
