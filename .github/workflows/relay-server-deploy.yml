name: relay-server-deploy

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: relay-server-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: midwesshub/bytover-relay

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      ENVIRONMENT: ${{ vars.ENVIRONMENT }}
      BYTOVER_WITH_SSL: ${{ vars.BYTOVER_WITH_SSL }}
      BYTOVER_PUBLIC_GATEWAY_HOST: ${{ vars.BYTOVER_PUBLIC_GATEWAY_HOST }}
      BYTOVER_PUBLIC_GATEWAY_PORT: ${{ vars.BYTOVER_PUBLIC_GATEWAY_PORT }}
      BYTOVER_PUBLIC_HTTP1_GATEWAY_HOST: ${{ vars.BYTOVER_PUBLIC_HTTP1_GATEWAY_HOST }}
      BYTOVER_PUBLIC_HTTP1_GATEWAY_PORT: ${{ vars.BYTOVER_PUBLIC_HTTP1_GATEWAY_PORT }}
      RELAY_SERVER_SECRET: ${{ secrets.RELAY_SERVER_SECRET }}
      TURN_PORT: ${{ vars.TURN_PORT }}
      TURN_USERNAME: ${{ vars.TURN_USERNAME }}
      TURN_PASSWORD: ${{ secrets.TURN_PASSWORD }}
      TURN_AUTH_SECRET: ${{ secrets.TURN_AUTH_SECRET }}
      RUST_LOG: ${{ vars.RUST_LOG }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GIT_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tag
        id: image_tag
        run: |
          tag="$(git rev-parse --short=7 "$GITHUB_SHA")"
          echo "value=$tag" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.MIDWESS_DOCKER_USER }}
          password: ${{ secrets.MIDWESS_DOCKER_PASSWORD }}

      - name: Build and push relay-server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: relay-server/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.image_tag.outputs.value }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Portainer stack redeploy
        if: github.ref_name == 'production'
        env:
          PORTAINER_URL: https://portainerportainer-celatest-production-109a.up.railway.app
          PORTAINER_ENDPOINT_ID: "8"
          PORTAINER_STACK_ID: "4"
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
        run: |
          set -euo pipefail

          for required_var in \
            PORTAINER_URL \
            PORTAINER_ENDPOINT_ID \
            PORTAINER_STACK_ID \
            PORTAINER_API_KEY \
            ENVIRONMENT \
            RELAY_SERVER_SECRET \
            TURN_PASSWORD \
            TURN_AUTH_SECRET
          do
            if [ -z "${!required_var:-}" ]; then
              echo "::error::Missing required value: $required_var"
              exit 1
            fi
          done

          portainer_headers=(
            -H "Content-Type: application/json"
            -H "X-API-Key: $PORTAINER_API_KEY"
          )

          stack_response="$(
            curl --fail --show-error --silent \
              --retry 3 \
              --retry-all-errors \
              --connect-timeout 10 \
              --max-time 60 \
              "${portainer_headers[@]}" \
              "$PORTAINER_URL/api/stacks/$PORTAINER_STACK_ID"
          )"

          stack_file_content="$(cat relay-server/docker-compose.swarm.yml)"

          updated_env="$(
            printf '%s' "$stack_response" | jq \
              --arg relay_server_image_tag "${{ steps.image_tag.outputs.value }}" \
              --arg environment "$ENVIRONMENT" \
              --arg relay_server_secret "$RELAY_SERVER_SECRET" \
              --arg bytover_with_ssl "$BYTOVER_WITH_SSL" \
              --arg bytover_public_gateway_host "$BYTOVER_PUBLIC_GATEWAY_HOST" \
              --arg bytover_public_gateway_port "$BYTOVER_PUBLIC_GATEWAY_PORT" \
              --arg bytover_public_http1_gateway_host "$BYTOVER_PUBLIC_HTTP1_GATEWAY_HOST" \
              --arg bytover_public_http1_gateway_port "$BYTOVER_PUBLIC_HTTP1_GATEWAY_PORT" \
              --arg turn_port "$TURN_PORT" \
              --arg turn_username "$TURN_USERNAME" \
              --arg turn_password "$TURN_PASSWORD" \
              --arg turn_auth_secret "$TURN_AUTH_SECRET" \
              --arg rust_log "$RUST_LOG" \
              '
              reduce [
                {"name":"RELAY_SERVER_IMAGE_TAG","value":$relay_server_image_tag},
                {"name":"ENVIRONMENT","value":$environment},
                {"name":"RELAY_SERVER_SECRET","value":$relay_server_secret},
                {"name":"BYTOVER_WITH_SSL","value":$bytover_with_ssl},
                {"name":"BYTOVER_PUBLIC_GATEWAY_HOST","value":$bytover_public_gateway_host},
                {"name":"BYTOVER_PUBLIC_GATEWAY_PORT","value":$bytover_public_gateway_port},
                {"name":"BYTOVER_PUBLIC_HTTP1_GATEWAY_HOST","value":$bytover_public_http1_gateway_host},
                {"name":"BYTOVER_PUBLIC_HTTP1_GATEWAY_PORT","value":$bytover_public_http1_gateway_port},
                {"name":"TURN_PORT","value":$turn_port},
                {"name":"TURN_USERNAME","value":$turn_username},
                {"name":"TURN_PASSWORD","value":$turn_password},
                {"name":"TURN_AUTH_SECRET","value":$turn_auth_secret},
                {"name":"RUST_LOG","value":$rust_log}
              ][] as $item
              ((.Env // []);
                if any(.[]?; .name == $item.name) then
                  map(if .name == $item.name then .value = $item.value else . end)
                else
                  . + [$item]
                end
              )
              '
          )"

          payload="$(
            jq -n \
              --arg stack_file_content "$stack_file_content" \
              --argjson env "$updated_env" \
              --argjson webhook "$(printf '%s' "$stack_response" | jq '.Webhook // null')" \
              '{
                StackFileContent: $stack_file_content,
                Env: $env,
                Prune: true,
                PullImage: true,
                Webhook: $webhook
              }'
          )"

          curl --fail --show-error --silent \
            --retry 3 \
            --retry-all-errors \
            --connect-timeout 10 \
            --max-time 60 \
            -X PUT \
            "${portainer_headers[@]}" \
            --data "$payload" \
            "$PORTAINER_URL/api/stacks/$PORTAINER_STACK_ID?endpointId=$PORTAINER_ENDPOINT_ID"

      - name: Skip Portainer redeploy outside production
        if: github.ref_name != 'production'
        run: echo "Skipping Portainer redeploy because branch is not production."
