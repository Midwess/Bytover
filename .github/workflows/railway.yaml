name: Railway Deployment

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.GIT_TOKEN }}

      - name: Push to deploy branch
        shell: bash
        run: |
          DEPLOY_BRANCH="${{ github.ref_name == 'production' && 'deploy-production' || 'deploy' }}"
          git checkout -b $DEPLOY_BRANCH

          # Remove cached submodules
          git rm --cached libs/schema libs/devlog-sdk libs/core-services || true

          # Remove .gitmodules if it exists
          git rm .gitmodules || true

          # Remove .git directories from submodules
          rm -rf libs/schema/.git libs/devlog-sdk/.git libs/core-services/.git

          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@devlog.studio'

          # Add submodules back as regular files
          git add libs/schema libs/devlog-sdk libs/core-services

          git commit -m "Deploy commit $(git rev-parse --short HEAD)"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Midwess/Bytover.git $DEPLOY_BRANCH -f
