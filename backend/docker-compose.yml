version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: bit-bridge-postgres
    environment:
      POSTGRES_USER: bitbridge
      POSTGRES_PASSWORD: bitbridgepass
      POSTGRES_DB: bitbridge
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations.sql:/docker-entrypoint-initdb.d/migrations.sql

volumes:
  postgres_data:
    driver: local