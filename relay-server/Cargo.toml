[package]
name = "relay-server"
description = "A relay server using actix-web with tokio and async multithreading"
authors.workspace = true
edition.workspace = true
version.workspace = true

[dependencies]
actix-web = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
socket2 = { workspace = true }
str0m = { workspace = true }
log = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
http = { workspace = true, features = ["std"] }
anyhow = { workspace = true }
devlog-sdk = { workspace = true, features = ["gateway", "grpc-server", "grpc-client"] }
schema = { workspace = true, features = ["client"] }
tonic = { workspace = true }
futures-util = { workspace = true }
reqwest = { workspace = true }
env_logger = "0.11.6"
