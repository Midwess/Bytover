[package]
name = "shared"
version = "0.1.0"
edition = "2021"

[features]
typegen = ["crux_core/typegen"]

[dependencies]
crux_core.workspace = true
uniffi = {workspace = true, features = ["bindgen"]}
wasm-bindgen = { version = "0.2.100" }
core-services = { path = "../libs/core-services", features = ["db-local"] }
schema = { path = "../libs/schema/rust", features = ["bindgen", "client"] }
devlog-sdk = { path = "../libs/devlog-sdk", features = ["db-local"] }
tokio = { workspace = true }
async-trait = { workspace = true }
log = { workspace = true }
bincode = { version = "1.3.3" }
erased-serde = { version = "0.4.5" }
thiserror = { workspace = true }
prost = { workspace = true }
uuid = { workspace = true }
rand = { workspace = true }
chrono = { workspace = true }
h3ron = { workspace = true }
geo-types = { workspace = true }
anyhow = { workspace = true }
ulid = { workspace = true }
serde = { workspace = true, features = ["derive"] }
url = { workspace = true }
surrealdb.workspace = true
surreal_devl = { workspace = true }
surreal_derive_plus = { workspace = true }
futures-util = { workspace = true }

[target.uniffi-bindgen.dependencies]
uniffi = { workspace = true, features = ["cli"] }

[build-dependencies]
uniffi = { workspace = true, features = ["build"] }
