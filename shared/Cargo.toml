[package]
name = "shared"
version = "0.1.0"
edition = "2021"

[profile.dev]
opt-level = 0

[lib]
crate-type = ["lib", "staticlib", "cdylib"]
name = "shared"

[features]
typegen = ["crux_core/typegen"]

[dependencies]
crux_core.workspace = true
serde = { workspace = true, features = ["derive"] }
surrealdb = { workspace = true, features = ["kv-surrealkv"] }
lazy_static.workspace = true
uniffi = "0.28.3"
wasm-bindgen = "0.2.100"
core-services = {path = "../libs/core-services"}
schema = {path = "../libs/schema/rust"}
devlog-sdk = {path = "../libs/devlog-sdk"}
domain = {path = "../domain"}
tokio = { workspace = true }
async-trait.workspace = true
log.workspace = true
bincode = "1.3.3"
erased-serde = "0.4.5"
tokio-scoped.workspace = true
tonic.workspace = true
thiserror.workspace = true
surreal_devl.workspace = true
surreal_derive_plus.workspace = true

[target.uniffi-bindgen.dependencies]
uniffi = { version = "0.28.3", features = ["cli"] }

[build-dependencies]
uniffi = { version = "0.28.3", features = ["build"] }
