[package]
name = "shared"
version = "0.1.0"
edition = "2021"
[lib]
crate-type = ["cdylib", "rlib"]

[features]
typegen = ["crux_core/typegen"]

[dependencies]
crux_core.workspace = true
uniffi = {workspace = true, features = ["bindgen"]}
core-services = { path = "../libs/core-services", default-features = false }
schema = { path = "../libs/schema/rust", features = ["bindgen", "client"], default-features = false }
devlog-sdk = { path = "../libs/devlog-sdk", default-features = false }
async-trait = { workspace = true }
log = { workspace = true }
thiserror = { workspace = true }
rand = { workspace = true }
chrono = { workspace = true }
h3o = { workspace = true }
anyhow = { workspace = true }
ulid = { workspace = true }
serde = { workspace = true, features = ["derive"] }
url = { workspace = true }
futures-util = { workspace = true }

[target.uniffi-bindgen.dependencies]
uniffi = { workspace = true, features = ["cli"] }

[build-dependencies]
uniffi = { workspace = true, features = ["build"] }

[target.wasm32-unknown-unknown.dependencies]
getrandom = { workspace = true, features = ["wasm_js"] }
