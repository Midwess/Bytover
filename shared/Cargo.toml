[package]
name = "shared"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
typegen = ["crux_core/typegen"]

[dependencies]
crux_core.workspace = true
uniffi = {workspace = true}
core-services = { path = "../libs/core-services", default-features = false }
schema = { path = "../libs/schema/rust", features = ["bindgen", "client"], default-features = false }
devlog-sdk = { path = "../libs/devlog-sdk", default-features = false }
tonic = { workspace = true }
async-trait = { workspace = true }
log = { workspace = true }
thiserror = { workspace = true }
rand = { workspace = true }
chrono = { workspace = true }
h3o = { workspace = true }
anyhow = { workspace = true }
uuid = { workspace = true }
serde = { workspace = true, features = ["derive"] }
url = { workspace = true }
futures-util = { workspace = true }
bytes.workspace = true
prost.workspace = true
futures-timer.workspace = true
n0-future.workspace = true
async-stream.workspace = true
bincode.workspace = true
tower-service.workspace = true
reqwest.workspace = true
once_cell.workspace = true

matchbox_protocol.workspace = true
matchbox_socket.workspace = true
ewebsock = { workspace = true, features = ["tokio", "tls"] }
futures = "0.3.31"
wasm-bindgen-futures = "0.4.50"
http-body = "1.0.1"

[target.uniffi-bindgen.dependencies]
uniffi = { workspace = true, features = ["cli"] }

[build-dependencies]
uniffi = { workspace = true, features = ["build"] }