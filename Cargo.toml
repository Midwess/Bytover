[workspace]
members = [
    "shared",
    "shared_types",
    "libs/devlog-sdk",
    "libs/core-services",
    "libs/schema/rust",
    "Desktop/src-tauri",
    "domain"
]

resolver = "1"

[profile.dev]
opt-level = 0

[workspace.package]
authors = ["Jimmy"]
edition = "2021"

[workspace.dependencies]
anyhow = "1.0.95"
crux_core = "0.11.0"
serde = "1.0.217"
surrealdb = {version="2.1.4", default-features = false}
thiserror = "1.0.61"
serde_derive = "1.0.203"
serde_json = "1.0.117"
chrono = "0.4.39"
surreal_derive_plus = "2.2.0"
surreal_devl = "2.2.0"
once_cell = "1.19.0"
lazy_static = "1.5.0"
tonic-middleware = "0.1.4"
tokio = {version = "1.28.2", features = ["sync"]}
reqwest = { version = "0.12.9", default-features = false, features = ["json", "native-tls-vendored"] }
async-trait = "0.1.13"
log = "0.4.22"
