[workspace]
members = [
    "shared",
    "shared_types",
    "libs/devlog-sdk",
    "libs/core-services",
    "libs/schema/rust",
    # "Desktop/src-tauri",
    "backend"
, "backend"]

resolver = "1"

[profile.dev]
opt-level = 0
debug = 1
strip = false
split-debuginfo = "unpacked"
incremental = true
codegen-units = 256
lto = false
panic = "unwind"
debug-assertions = true
overflow-checks = true
rpath = false

[workspace.package]
authors = ["Jimmy"]
edition = "2021"

[workspace.dependencies]
anyhow = "1.0.97"
crux_core = "0.14.0"
serde = { version = "1.0.217" }
surrealdb = {version="2.3.5"}
thiserror = { version = "2.0.12" }
serde_derive = { version = "1.0.203" }
serde_json = { version = "1.0.117" }
chrono = "0.4.39"
surreal_derive_plus = "2.2.3"
surreal_devl = "2.2.2"
lazy_static = "1.5.0"
tonic-middleware = { version = "0.1.4" }
tokio = {version = "1.44.1", features = ["sync", "rt-multi-thread"]}
reqwest = { version = "0.12.9", features = ["json", "native-tls-vendored", "stream"] }
async-trait = { version = "0.1.13" }
log = { version = "0.4.22" }
tokio-scoped = { version = "0.2.0" }
tonic = { version = "0.11", features = ["tls"], default-features = false }
prost = { version = "0.12.6" }
uniffi = { version = "0.29.0" }
ping = { version = "0.5.2" }
md5 = { version = "0.7.0" }
zip = { version = "3.0.0" }
tokio-tungstenite = { version = "0.26.2" }
futures-util = { version = "0.3.31" }
url = { version = "2.5.4" }
webrtc = { git = "https://github.com/dev-logs/webrtc.git" }
uuid = { version = "1.16.0" }
rand = { version = "0.9.0" }
regex = { version = "1.11.1" }
stunclient = "0.4.1"
h3ron = { version = "0.18.0" }
geo-types = "0.7.16"
bytes = "1.10.1"
debounced = "0.2.0"
futures-channel = "0.3.31"
ulid = "1.2.1"
flate2 = "1.1.1"
tar = { git = "https://github.com/dev-logs/tar-rs.git" }
mime_guess = "2.0.5"
aws-smithy-async = "1.2.5"
tokio-util = "0.7.15"

[patch.crates-io]
affinitypool = { git = "https://github.com/dev-logs/affinitypool.git", version = "0.3.1" }

[workspace.metadata.bin]
cargo-xcode = { version = "=1.7.0" }
cargo-run-bin = { version = "1.7.2" }
cargo-binstall = { version = "1.10.22" }

[workspace.metadata]
# Will log the query command at runtime
surreal_enable_log = true
# Will log the generated code at build time
surreal_enable_compile_log = true
# Change the naming convention of generated statement into camel case
surreal_use_camel_case = false
# The log namespace, apply for both build time log and runtime log
surreal_namespace = "surrealql"
# The macro name that use for info log
surreal_info_log_macro = "log::info"
# The macro name that use for warning log
surreal_warn_log_macro = "log::info"
