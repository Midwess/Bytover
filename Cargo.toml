[workspace]
members = [
    "shared",
    "shared_types",
    "libs/devlog-sdk",
    "libs/core-services",
    "libs/schema/rust",
    # "Desktop/src-tauri",
    "backend",
    "native"
]

resolver = "1"

[profile.dev]
opt-level = 0
debug = 1
strip = false
split-debuginfo = "unpacked"
incremental = true
codegen-units = 256
lto = false
panic = "unwind"
debug-assertions = true
overflow-checks = true
rpath = false

[profile.release]
lto = true
strip = true
opt-level = 3
panic = 'abort'
codegen-units = 1


[workspace.package]
authors = ["Jimmy"]
edition = "2021"

[patch.crates-io]
affinitypool = { git = "https://github.com/dev-logs/affinitypool.git", version = "0.3.1" }

[workspace.dependencies]
anyhow = "1.0.98"
crux_core = "0.15.0"
serde = { version = "1.0.219", features = ["derive"] }
surrealdb = { version="2.3.6", default-features = false }
thiserror = { version = "2.0.12" }
serde_derive = { version = "1.0.203" }
serde_json = { version = "1.0.117" }
chrono = "0.4.41"
surreal_derive_plus = "2.2.3"
surreal_devl = "2.2.2"
lazy_static = "1.5.0"
tonic-middleware = { version = "0.3.0" }
tokio = {version = "1.45.1", default-features = false}
reqwest = { version = "0.12.9", features = ["json", "rustls-tls-webpki-roots", "stream"] }
async-trait = { version = "0.1.13" }
log = { version = "0.4.22" }
tonic = { version = "0.13.1", default-features = false }
prost = { version = "0.13.5", default-features = false }
uniffi = { version = "0.29.3" }
bincode = { version = "1.3.3" }
md5 = { version = "0.7.0" }
zip = { version = "3.0.0" }
tower-service = "0.3.3"
tokio-tungstenite = { version = "*", features = ["rustls-tls-webpki-roots"] }
futures-util = { version = "0.3.31" }
url = { version = "2.5.4" }
webrtc = { git = "https://github.com/dev-logs/webrtc.git" }
uuid = { version = "1.17.0" }
getrandom = { version = "0.3.3", default-features = false }
rand = { version = "0.9.1" }
regex = { version = "1.11.1" }
stunclient = "0.4.1"
h3o = { version = "0.8.0" }
bytes = { version = "1.10.1", default-features = false }
ulid = "1.2.1"
flate2 = "1.1.1"
tar = { git = "https://github.com/dev-logs/tar-rs.git" }
mime_guess = "2.0.5"
aws-smithy-async = "1.2.5"
tokio-util = { version = "0.7.15", default-features = false }
redb = "2.6.0"
redb_model = "0.11.3"
matchbox_protocol = { git = "https://github.com/dev-logs/matchbox.git" }
matchbox_socket = { git = "https://github.com/dev-logs/matchbox.git" }
ewebsock = { version = "0.8.0", features = ["tls", "tokio"] }
futures-timer = "3.0.3"
n0-future = "0.1.3"
http = "1.3.1"
async-stream = "0.3.6"

[workspace.metadata.bin]
cargo-xcode = { version = "=1.7.0" }
cargo-run-bin = { version = "1.7.2" }
cargo-binstall = { version = "1.10.22" }

[workspace.metadata]
# Will log the query command at runtime
surreal_enable_log = true
# Will log the generated code at build time
surreal_enable_compile_log = true
# Change the naming convention of generated statement into camel case
surreal_use_camel_case = false
# The log namespace, apply for both build time log and runtime log
surreal_namespace = "surrealql"
# The macro name that use for info log
surreal_info_log_macro = "log::info"
# The macro name that use for warning log
surreal_warn_log_macro = "log::info"
