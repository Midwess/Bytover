[workspace]
members = [
    "shared",
    "shared_types",
    "libs/devlog-sdk",
    "libs/core-services",
    "libs/schema/rust",
    # "Desktop/src-tauri",
    "domain"
]

resolver = "1"

[profile.dev]
opt-level = 0
debug = 1
strip = false
split-debuginfo = "unpacked"
incremental = true
codegen-units = 256
lto = false
panic = "unwind"
debug-assertions = true
overflow-checks = true
rpath = false

[workspace.package]
authors = ["Jimmy"]
edition = "2021"

[workspace.dependencies]
anyhow = "1.0.95"
crux_core = "0.11.3"
serde = { version = "1.0.217", default-features = false }
surrealdb = {version="2.2.1", default-features = false}
thiserror = { version = "1.0.61", default-features = false }
serde_derive = { version = "1.0.203", default-features = false }
serde_json = { version = "1.0.117", default-features = false }
chrono = "0.4.39"
surreal_derive_plus = "2.2.2"
surreal_devl = "2.2.2"
lazy_static = "1.5.0"
tonic-middleware = { version = "0.1.4", default-features = false }
tokio = {version = "1.28.2", default-features = false, features = ["sync"]}
reqwest = { version = "0.12.9", default-features = false, features = ["json", "native-tls-vendored"] }
async-trait = { version = "0.1.13", default-features = false }
log = { version = "0.4.22", default-features = false }
tokio-scoped = { version = "0.2.0", default-features = false }
tonic = { version = "0.11", default-features = false }
prost = { version = "0.12.6", default-features = false }
uniffi = { version = "0.29.0" }
ping = { version = "0.5.2", default-features = false }
md5 = { version = "0.7.0", default-features = false }
zip = { version = "2.2.2", default-features = false }
tokio-tungstenite = { version = "0.26.2" }
futures-util = { version = "0.3.31" }
tiny_http = { version = "0.12.0" }
url = { version = "2.5.4" }
mdns-sd = { version = "0.13.3" }
webrtc = { version = "0.12.0" }
uuid = { version = "1.16.0" }
rand = { version = "0.9.0" }

[workspace.metadata.bin]
cargo-xcode = { version = "=1.7.0" }
cargo-run-bin = { version = "1.7.2", default-features = false }
cargo-binstall = { version = "1.10.22" }

[workspace.metadata]
# Will log the query command at runtime
surreal_enable_log = true
# Will log the generated code at build time
surreal_enable_compile_log = true
# Change the naming convention of generated statement into camel case
surreal_use_camel_case = false
# The log namespace, apply for both build time log and runtime log
surreal_namespace = "surrealql"
# The macro name that use for info log
surreal_info_log_macro = "log::info"
# The macro name that use for warning log
surreal_warn_log_macro = "log::info"